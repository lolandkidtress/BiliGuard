<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>哔哩护苗 - 控制台</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>哔哩护苗</h1>
  </div>

  <!-- 未登录状态 -->
  <div id="login-section" class="section">
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="username" placeholder="请输入邮箱">
    </div>
    <div class="form-group">
      <label>密码</label>
      <div class="password-field">
        <input type="password" id="password" placeholder="请输入密码">
        <button type="button" class="toggle-password" aria-label="显示密码">
          <svg class="eye-open" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          <svg class="eye-closed" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
        </button>
      </div>
    </div>
    <button class="btn btn-primary" id="btn-login">登录</button>
    <div class="btn-row">
      <button class="btn btn-secondary" id="btn-register">注册账号</button>
    </div>
    <div class="forgot-row">
      <a href="#" id="link-forgot-login">忘记密码？</a>
    </div>
    <div id="login-message" class="message hidden"></div>
  </div>

  <!-- 忘记登录密码弹窗 -->
  <div id="forgot-login-modal" class="modal hidden">
    <div class="modal-content">
      <h3>重置登录密码</h3>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="forgot-login-email" placeholder="注册时填写的邮箱">
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="btn-forgot-login-send">发送验证码</button>
      </div>
      <div class="form-group">
        <label>验证码</label>
        <input type="text" id="forgot-login-code" placeholder="6位数字" maxlength="6">
      </div>
      <div class="form-group">
        <label>新密码</label>
        <div class="password-field">
        <input type="password" id="forgot-login-new-pwd" placeholder="至少6个字符">
        <button type="button" class="toggle-password" aria-label="显示密码">
          <svg class="eye-open" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          <svg class="eye-closed" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
        </button>
      </div>
      </div>
      <div class="form-group">
        <label>确认新密码</label>
        <div class="password-field">
        <input type="password" id="forgot-login-new-pwd-confirm" placeholder="再次输入">
        <button type="button" class="toggle-password" aria-label="显示密码">
          <svg class="eye-open" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          <svg class="eye-closed" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
        </button>
      </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-forgot-login-submit">重置</button>
        <button class="btn btn-secondary" id="btn-forgot-login-cancel">取消</button>
      </div>
      <div id="forgot-login-message" class="message hidden"></div>
    </div>
  </div>

  <!-- 注册弹窗 -->
  <div id="register-modal" class="modal hidden">
    <div class="modal-content">
      <h3>注册账号</h3>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="reg-email" placeholder="用于登录和找回配置密码">
      </div>
      <div class="form-group">
        <label>邮箱验证码</label>
        <div class="form-row">
          <button class="btn btn-secondary" id="btn-send-reg-code">发送验证码</button>
          <input type="text" id="reg-code" placeholder="6位数字" maxlength="6" style="flex: 1;">
        </div>
      </div>
      <div class="form-group">
        <label>密码</label>
        <div class="password-field">
        <input type="password" id="reg-password" placeholder="至少6个字符">
        <button type="button" class="toggle-password" aria-label="显示密码">
          <svg class="eye-open" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          <svg class="eye-closed" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
        </button>
      </div>
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <div class="password-field">
        <input type="password" id="reg-password-confirm" placeholder="再次输入密码">
        <button type="button" class="toggle-password" aria-label="显示密码">
          <svg class="eye-open" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          <svg class="eye-closed" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
        </button>
      </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-reg-submit">注册</button>
        <button class="btn btn-secondary" id="btn-reg-cancel">取消</button>
      </div>
      <div id="reg-message" class="message hidden"></div>
    </div>
  </div>

  <!-- 已登录状态 -->
  <div id="logged-section" class="section hidden">
    <div class="user-info">
      <div class="username" id="display-username">--</div>
      <button class="btn-logout-small" id="btn-logout">登出</button>
    </div>
    <div class="membership-info">
      <span class="membership-label">会员到期：</span>
      <span class="membership-value" id="membership-expire-time">--</span>
    </div>
    <div class="mgmt-row">
      <span>远程管理端：</span>
      <a href="https://main.biliguard.pages.dev" target="_blank" rel="noopener">main.biliguard.pages.dev</a>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-options">配置</button>
    </div>

    <div class="stats-section">
      <div class="stats-tabs">
        <button class="stats-tab active" id="tab-stats" data-tab="stats">观看统计</button>
        <button class="stats-tab" id="tab-blocked" data-tab="blocked">被拦截</button>
        <button class="btn-refresh" id="btn-refresh-stats" title="刷新">⟳ 刷新</button>
      </div>
      <div id="stats-pane" class="stats-pane">
        <div class="stats-header"><span id="stats-count">共 0 条记录</span></div>
        <div id="stats-list" class="stats-list"></div>
      </div>
      <div id="blocked-pane" class="stats-pane hidden">
        <div class="stats-header"><span id="blocked-count">共 0 条记录</span></div>
        <div id="blocked-list" class="stats-list"></div>
      </div>
    </div>

    <div class="contact-row">
      <a href="#" id="link-contact">联系我们</a>
    </div>
  </div>

  <!-- 登录过期状态 -->
  <div id="expired-section" class="section hidden">
    <div class="form-group">
      <p class="small-text">登录已过期，请重新登录</p>
    </div>
    <button class="btn btn-primary" id="btn-relogin">重新登录</button>
  </div>

  <!-- 设置配置密码弹窗 -->
  <div id="config-pwd-modal" class="modal hidden">
    <div class="modal-content">
      <h3>设置配置密码</h3>
      <p class="small-text">首次登录，请设置配置密码。修改白名单和设置时需要验证此密码。</p>
      <div class="form-group">
        <label>配置密码</label>
        <div class="password-field">
        <input type="password" id="config-password" placeholder="至少6个字符">
        <button type="button" class="toggle-password" aria-label="显示密码">
          <svg class="eye-open" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          <svg class="eye-closed" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
        </button>
      </div>
      </div>
      <div class="form-group">
        <label>确认配置密码</label>
        <div class="password-field">
        <input type="password" id="config-password-confirm" placeholder="再次输入">
        <button type="button" class="toggle-password" aria-label="显示密码">
          <svg class="eye-open" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          <svg class="eye-closed" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
        </button>
      </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-config-submit">设置</button>
      </div>
      <div id="config-message" class="message hidden"></div>
    </div>
  </div>

  <!-- 忘记配置密码弹窗 -->
  <div id="reset-config-modal" class="modal hidden">
    <div class="modal-content">
      <h3>重置配置密码</h3>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="reset-email" placeholder="注册时填写的邮箱">
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" id="btn-send-code">发送验证码</button>
      </div>
      <div class="form-group">
        <label>验证码</label>
        <input type="text" id="reset-code" placeholder="6位数字">
      </div>
      <div class="form-group">
        <label>新配置密码</label>
        <div class="password-field">
        <input type="password" id="reset-new-pwd" placeholder="至少6个字符">
        <button type="button" class="toggle-password" aria-label="显示密码">
          <svg class="eye-open" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          <svg class="eye-closed" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
        </button>
      </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-reset-submit">重置</button>
        <button class="btn btn-secondary" id="btn-reset-cancel">取消</button>
      </div>
      <div id="reset-message" class="message hidden"></div>
    </div>
  </div>

  <!-- 验证配置密码弹窗（登出用） -->
  <div id="verify-config-modal" class="modal hidden">
    <div class="modal-content">
      <h3>验证配置密码</h3>
      <p class="small-text">登出需要验证配置密码</p>
      <div class="form-group">
        <div class="password-field">
        <input type="password" id="verify-config-password" placeholder="请输入配置密码">
        <button type="button" class="toggle-password" aria-label="显示密码">
          <svg class="eye-open" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          <svg class="eye-closed" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
        </button>
      </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-verify-config-submit">确认</button>
        <button class="btn btn-secondary" id="btn-verify-config-cancel">取消</button>
      </div>
      <div id="verify-config-message" class="message hidden"></div>
    </div>
  </div>

  <!-- 联系我们弹窗 -->
  <div id="contact-modal" class="modal hidden">
    <div class="modal-content contact-modal-content">
      <h3>联系我们</h3>
      <div class="contact-list">
        <a href="https://wa.me/85254200437" target="_blank" rel="noopener" class="contact-item">
          <svg class="contact-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
          WhatsApp
        </a>
        <a href="mailto:support@7wapilot.com" class="contact-item">
          <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          support@7wapilot.com
        </a>
      </div>
      <div class="contact-qr">
        <span>企业微信</span>
        <img src="icons/7wapilot-wecom-scan.png" alt="企业微信二维码">
      </div>
      <button type="button" class="btn btn-secondary" id="btn-contact-close">关闭</button>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="api.js"></script>
  <script src="popup.js"></script>
  <script src="decorations.js"></script>
<script src="password-toggle.js"></script>
</body>
</html>
